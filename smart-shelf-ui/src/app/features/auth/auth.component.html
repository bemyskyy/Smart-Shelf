<div class="min-h-screen flex items-center justify-center px-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-900 tracking-tight">
        {{ isLoginMode ? 'Вход в SmartShelf' : 'Создать аккаунт' }}
      </h2>
      <p class="text-sm text-gray-500 mt-2">
        Платформа для обмена ресурсами
      </p>
    </div>

    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100">
      {{ errorMessage }}
    </div>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Имя пользователя</label>
        <input
          type="text"
          formControlName="username"
          class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
          placeholder="Например, user"
        >
        <div *ngIf="f['username'].invalid && f['username'].touched" class="text-red-500 text-xs mt-1">
          Логин обязателен (минимум 3 символа)
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
        <input
          type="password"
          formControlName="password"
          class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
          placeholder="••••••••"
        >
        <div *ngIf="f['password'].invalid && f['password'].touched" class="text-red-500 text-xs mt-1">
          Пароль обязателен (минимум 4 символа)
        </div>
      </div>

      <button
        type="submit"
        [disabled]="authForm.invalid || isLoading"
        class="w-full py-2.5 px-4 bg-primary hover:bg-blue-700 text-white font-medium rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center"
      >
        <span *ngIf="!isLoading">{{ isLoginMode ? 'Войти' : 'Зарегистрироваться' }}</span>
        <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>

    </form>

    <div class="mt-6 text-center text-sm">
      <span class="text-gray-500">
        {{ isLoginMode ? 'Нет аккаунта?' : 'Уже есть аккаунт?' }}
      </span>
      <button
        type="button"
        (click)="toggleMode()"
        class="ml-1 text-primary hover:text-blue-700 font-medium hover:underline focus:outline-none"
      >
        {{ isLoginMode ? 'Зарегистрироваться' : 'Войти' }}
      </button>
    </div>

  </div>
</div>
