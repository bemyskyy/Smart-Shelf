<div class="space-y-6">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Мой инвентарь</h1>
      <p class="mt-1 text-sm text-gray-500">Вещи, которыми вы делитесь с комьюнити.</p>
    </div>
    <button (click)="openModal()" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-700 transition-colors">
      <svg class="-ml-1 mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      Добавить вещь
    </button>
  </div>

  <div *ngIf="items.length === 0" class="text-center py-16 bg-white rounded-xl border border-dashed border-gray-300">
    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
    <h3 class="mt-2 text-sm font-medium text-gray-900">У вас пока нет вещей</h3>
    <p class="mt-1 text-sm text-gray-500">Добавьте свою первую вещь, чтобы коллеги могли ее взять.</p>
  </div>

  <div *ngIf="items.length > 0" class="bg-white shadow-sm rounded-xl border border-gray-200 overflow-hidden">
    <ul class="divide-y divide-gray-200">
      <li *ngFor="let item of items" class="p-6 hover:bg-gray-50 transition-colors">
        <div class="flex items-center justify-between">
          <div class="flex-1">
            <h4 class="text-lg font-bold text-gray-900">{{ item.title }}</h4>
            <p class="mt-1 text-sm text-gray-600">{{ item.description || 'Нет описания' }}</p>
          </div>
          <div class="ml-4 flex-shrink-0">
            <span *ngIf="item.status === 'AVAILABLE'" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 border border-green-200">
              Доступна
            </span>
            <span *ngIf="item.status === 'IN_USE'" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 border border-blue-200">
              На руках
            </span>
          </div>
        </div>
      </li>
    </ul>
  </div>
</div>

<div *ngIf="showAddModal" class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">

    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" (click)="closeModal()"></div>

    <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

    <div class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
      <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
          <h3 class="text-lg leading-6 font-bold text-gray-900 mb-4" id="modal-title">
            Добавить новую вещь
          </h3>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Название <span class="text-red-500">*</span></label>
              <input type="text" formControlName="title" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" placeholder="Например: Книга Java Concurrency">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
              <textarea formControlName="description" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" placeholder="Укажите состояние вещи или другие детали"></textarea>
            </div>
          </div>
        </div>

        <div class="bg-gray-50 px-4 py-3 sm:px-6 flex justify-end space-x-3">
          <button type="button" (click)="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 focus:outline-none transition-colors">
            Отмена
          </button>
          <button type="submit" [disabled]="itemForm.invalid" class="px-4 py-2 text-sm font-medium text-white bg-primary border border-transparent rounded-md hover:bg-blue-700 focus:outline-none transition-colors disabled:opacity-50">
            Сохранить
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
