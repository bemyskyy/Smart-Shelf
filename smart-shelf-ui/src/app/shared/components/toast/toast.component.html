<div class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none">
  <div *ngFor="let toast of toastService.toasts$ | async"
       class="pointer-events-auto transform transition-all duration-300 ease-in-out flex items-center p-4 rounded-lg shadow-lg text-sm font-medium text-white max-w-sm w-full"
       [ngClass]="toast.type === 'success' ? 'bg-green-600' : 'bg-red-600'">

    <svg *ngIf="toast.type === 'success'" class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>

    <svg *ngIf="toast.type === 'error'" class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>

    <span class="flex-1">{{ toast.message }}</span>

    <button (click)="toastService.removeToast(toast.id)" class="ml-4 text-white hover:text-gray-200 focus:outline-none">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
  </div>
</div>
